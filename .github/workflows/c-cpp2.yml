name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4   # ← This is usually missing when it hangs

    - name: Compile & Run C Program
      run: |
        echo "🔨 Compiling..."
        gcc -Wall -Wextra -std=c99 *.c -o my_program
        
        if [ $? -eq 0 ]; then
          echo "✅ Build successful!"
          echo "Running program..."
          ./my_program
        else
          echo "❌ Build failed!"
          exit 1
        fi
